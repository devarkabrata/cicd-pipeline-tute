name: Test Demo Workflow

on: [push]

jobs:
  job-1:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Greeting Step
        run: echo "Hello CI/CD Pipeline"

      - name: Checkout code in VM
        uses: actions/checkout@v4

      - name: Setting up the NODE Environment
        uses: actions/setup-node@v4
        with: 
          node-version: "24.13"
          cache: "npm"

      - name: Installing Dependencies
        run: npm install

      - name: Testing the flow
        run: npm run test

      - name: Starting the server and listening
        run: |
          npm run start &
          sleep 5
          curl -s -w "\nHTTP Status: %{http_code}\n" --fail http://localhost:3000/greet